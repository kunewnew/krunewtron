  <!-- React code with Babel compiler -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    //  REUSABLE COMPONENT: FadeIn
    // ==========================================
    const FadeIn = ({ children, delay = 0, duration = 0.7, x = 0, y = 20, className = "" }) => {
      const [isVisible, setIsVisible] = useState(false);
      const domRef = useRef();

      useEffect(() => {
        setIsVisible(true);
      }, []);

      const style = {
        opacity: isVisible ? 1 : 0,
        transform: isVisible 
          ? 'translate3d(0,0,0)' 
          : `translate3d(${x}px, ${y}px, 0)`,
        transition: `opacity ${duration}s cubic-bezier(0.25, 0.1, 0.25, 1) ${delay}s, transform ${duration}s cubic-bezier(0.25, 0.1, 0.25, 1) ${delay}s`
      };

      return (
        <div ref={domRef} style={style} className={className}>
          {children}
        </div>
      );
    };

    // ==========================================
    //  REUSABLE COMPONENT: Magnet
    // ==========================================
    const Magnet = ({ children, padding = 150, strength = 3, className = "" }) => {
      const magnetRef = useRef();
      const [transform, setTransform] = useState("translate3d(0px, 0px, 0px)");
      const [transition, setTransition] = useState("transform 0.6s ease-in-out");

      const handleMouseMove = (e) => {
        if (!magnetRef.current) return;
        const rect = magnetRef.current.getBoundingClientRect();
        
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const distanceX = e.clientX - centerX;
        const distanceY = e.clientY - centerY;
        
        const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
        
        if (distance < padding) {
          setTransition("transform 0.3s ease-out");
          const targetX = distanceX / strength;
          const targetY = distanceY / strength;
          setTransform(`translate3d(${targetX}px, ${targetY}px, 0) scale(1.05)`);
        } else {
          resetPosition();
        }
      };

      const resetPosition = () => {
        setTransition("transform 0.6s ease-in-out");
        setTransform("translate3d(0px, 0px, 0px) scale(1)");
      };

      useEffect(() => {
        window.addEventListener("mousemove", handleMouseMove);
        return () => window.removeEventListener("mousemove", handleMouseMove);
      }, [padding, strength]);

      return (
        <div 
          ref={magnetRef} 
          style={{ transform, transition, willChange: 'transform' }} 
          className={`cursor-pointer ${className}`}
          onMouseLeave={resetPosition}
        >
          {children}
        </div>
      );
    };

    // ==========================================
    //  REUSABLE COMPONENT: Starfield Background
    // ==========================================
    const Starfield = () => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        
        const resizeCanvas = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Create stars
        const stars = [];
        const numStars = 120;
        for (let i = 0; i < numStars; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5 + 0.4,
            speed: Math.random() * 0.05 + 0.015,
            alpha: Math.random(),
            fade: Math.random() > 0.5 ? 1 : -1
          });
        }
        
        // Render loop
        const render = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          stars.forEach(star => {
            // Draw star
            ctx.fillStyle = `rgba(215, 226, 234, ${star.alpha})`;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
            
            // Move star (drift slowly upwards)
            star.y -= star.speed;
            if (star.y < 0) {
              star.y = canvas.height;
              star.x = Math.random() * canvas.width;
            }
            
            // Twinkle
            star.alpha += 0.008 * star.fade;
            if (star.alpha > 1) {
              star.alpha = 1;
              star.fade = -1;
            } else if (star.alpha < 0.1) {
              star.alpha = 0.1;
              star.fade = 1;
            }
          });
          
          animationFrameId = requestAnimationFrame(render);
        };
        render();
        
        return () => {
          window.removeEventListener('resize', resizeCanvas);
          cancelAnimationFrame(animationFrameId);
        };
      }, []);

      return (
        <canvas 
          ref={canvasRef} 
          className="fixed inset-0 w-full h-full pointer-events-none z-0"
        />
      );
    };

    // ==========================================
    //  REUSABLE COMPONENT: TransparentImage (CSS Screen Blending)
    // ==========================================
    const TransparentImage = ({ src, alt, className, style = {} }) => {
      return (
        <img 
          src={src} 
          alt={alt} 
          className={className} 
          style={{ ...style, mixBlendMode: 'screen' }}

      );
    };

    // ==========================================
    //  MAIN APPLICATION: Split-Screen Dashboard
    // ==========================================

      // Load saved notes

        setLabelColor("text-accentamber");
        
        if (saveTimerRef.current) {

        saveTimerRef.current = setTimeout(() => {

      useEffect(() => {
        const updateClock = () => {
          const daysThai = ['วันอาทิตย์', 'วันจันทร์', 'วันอังคาร', 'วันพุธ', 'วันพฤหัสบดี', 'วันศุกร์', 'วันเสาร์'];
          const monthsThai = [
            'มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 
            'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'
          ];
          
          const now = new Date();
          
          const hours = String(now.getHours()).padStart(2, '0');
          const minutes = String(now.getMinutes()).padStart(2, '0');
          const seconds = String(now.getSeconds()).padStart(2, '0');

          const dayName = daysThai[now.getDay()];
          const dateNum = now.getDate();
          const monthName = monthsThai[now.getMonth()];
          const yearTH = now.getFullYear() + 543;
          setDateStr(`${dayName}ที่ ${dateNum} ${monthName} ${yearTH}`);
          
          const hr = now.getHours();
          if (hr >= 5 && hr < 12) {
            setGreeting("อรุณสวัสดิ์ครับคุณครู 🌅");
          } else if (hr >= 12 && hr < 17) {
            setGreeting("สวัสดีตอนบ่ายครับคุณครู ☀️");
          } else if (hr >= 17 && hr < 21) {
            setGreeting("สวัสดีตอนเย็นครับคุณครู 🌆");
          } else {
            setGreeting("สวัสดีตอนค่ำครับคุณครู 🌌");
          }
        };

        updateClock();
        const interval = setInterval(updateClock, 1000);
        return () => clearInterval(interval);
      }, []);

      const appCards = [
        {
          title: "ระบบเช็คชื่อเข้าเรียนรายวิชา",
          desc: "บันทึกเวลาเรียน ขาด ลา มาสาย รายคาบและรายห้องเรียนอย่างเป็นระเบียบ",
          url: "เช็คชื่อรายวิชา/index.html",
          image: "images/grad-cap.png",
          badge: "เช็คผ่านกล้อง 📷",
          colorClass: "hover:border-accentblue hover:shadow-[0_0_20px_rgba(59,130,246,0.15)]",
          badgeStyle: { color: '#60a5fa', borderColor: '#60a5fa', background: 'rgba(59, 130, 246, 0.08)' }
        },
        {
          title: "เช็คชื่อ ม.4-ม.6 เตรียมวิศวะ",
          desc: "ระบบบันทึกการเข้าเรียนออนไลน์ ห้องเรียนพิเศษเตรียมวิศวกรรมศาสตร์ 3 ห้องเรียน",
          url: "เช็คชื่อ-เตรียมวิศวะ.html",
          image: "images/gear.png",
          badge: "ม.4 - ม.6 🚀",
          colorClass: "hover:border-accentred hover:shadow-[0_0_20px_rgba(244,63,94,0.15)]",
          badgeStyle: { color: '#f43f5e', borderColor: '#f43f5e', background: 'rgba(244, 63, 94, 0.08)' }
        },
        {
          title: "ระบบติดตามส่งงาน/ข้อสอบ",
          desc: "บันทึกความก้าวหน้าการส่งการบ้านและข้อสอบอย่างรวดเร็ว รองรับสแกนคิวอาร์การ์ดเด็ก",
          url: "ส่งงาน/index-ส่งงาน.html",

          badge: "สแกนสปีด 📝",
          colorClass: "hover:border-accentpurple hover:shadow-[0_0_20px_rgba(139,92,246,0.15)]",
          badgeStyle: { color: '#a78bfa', borderColor: '#a78bfa', background: 'rgba(139, 92, 246, 0.08)' }

          url: "สุ่มเลขที่/index.html",
          image: "images/dice.png",
          badge: "มินิเกมกิจกรรม 🦆",
          colorClass: "hover:border-accentamber hover:shadow-[0_0_20px_rgba(245,158,11,0.15)]",
          badgeStyle: { color: '#fbbf24', borderColor: '#fbbf24', background: 'rgba(245, 158, 11, 0.08)' }
        },
        {
          title: "บอร์ดเกมคลับพัฒนาทักษะ",
          desc: "คลังบอร์ดเกมเล่นง่ายพัฒนาตรรกะและความคิดสร้างสรรค์ เช่น Werewolf, Connect4, Othello",
          url: "boardgame/index.html",
          image: "images/dice.png",
          badge: "สันทนาการ 🧩",
          colorClass: "hover:border-accentpink hover:shadow-[0_0_20px_rgba(236,72,153,0.15)]",
          badgeStyle: { color: '#f472b6', borderColor: '#f472b6', background: 'rgba(236, 72, 153, 0.08)' }
        }
      ];

      return (
        <div className="w-full min-h-screen bg-darkbg flex flex-col lg:flex-row relative">
          
          {/* Animated Twinkling Starfield Background */}
          <Starfield />

          {/* Ambient Background Glows */}
          <div className="absolute top-[20%] left-[5%] w-[30vw] h-[30vw] rounded-full bg-accentpurple/5 blur-[120px] pointer-events-none z-0" />
          <div className="absolute bottom-[20%] right-[5%] w-[25vw] h-[25vw] rounded-full bg-accentblue/5 blur-[120px] pointer-events-none z-0" />

          {/* ========================================================
               LEFT COLUMN: BRANDING, CLOCK, MASCOT (Desktop Fixed)
             ======================================================== */}
          <div className="w-full lg:w-[35%] xl:w-[32%] lg:h-screen lg:sticky lg:top-0 p-8 sm:p-12 flex flex-col justify-between border-b lg:border-b-0 lg:border-r border-white/5 bg-black/25 z-10">
            
            {/* Top Logo */}
            <FadeIn delay={0} y={-15}>
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-xl bg-gradient-to-tr from-accentpurple to-accentblue flex items-center justify-center shadow-md shadow-accentpurple/15">
                  <svg viewBox="0 0 24 24" className="w-5.5 h-5.5 fill-none stroke-white stroke-[2.5]">
                    <path d="M12 2L1 7L12 12L23 7L12 2Z" />
                    <path d="M21 12.5V17.5L12 22L3 17.5V12.5" />
                    <path d="M12 12V22" />
                  </svg>
                </div>
                <div className="font-bold tracking-wider text-base sm:text-lg text-white font-kanit uppercase">
                  KRUNEWTRON<span className="text-accentpurple">.COM</span>
                </div>
              </div>
            </FadeIn>

                <Magnet padding={150} strength={3.5}>

              <div>
                <h1 className="hero-heading font-black tracking-tight leading-none text-4xl sm:text-5xl lg:text-[2.85rem] xl:text-[3.25rem] whitespace-nowrap uppercase select-none no-select mb-2">
                  ครูนิวตรอน.com
                </h1>
                <p className="text-textlight/70 font-light text-xs sm:text-sm max-w-[320px] leading-relaxed">

                </p>
              </div>

            </div>

            {/* Bottom: Thai Clock Widget */}

              <div className="glass-card rounded-2xl px-5 py-3.5 border border-white/5 flex flex-col items-center lg:items-start justify-center shadow-lg shadow-black/30">

                <div className="font-outfit text-xl sm:text-2xl font-bold tracking-widest text-accentemerald drop-shadow-[0_0_10px_rgba(16,185,129,0.18)]">

          </div>

          {/* ========================================================
               RIGHT COLUMN: MAIN APP CARDS GRID & TEXTAREA NOTE PAD
             ======================================================== */}
          <div className="w-full lg:w-[65%] xl:w-[68%] p-6 sm:p-10 lg:p-12 overflow-y-auto z-10 flex flex-col justify-between">
            
            <div>
